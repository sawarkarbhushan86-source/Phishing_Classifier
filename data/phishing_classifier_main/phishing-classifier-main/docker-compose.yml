version: '3.8'

services:
  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: DockerFile
    container_name: phishing-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./predictions:/app/predictions
      - ./reports:/app/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - phishing-network
    depends_on:
      - db

  # Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: DockerFile
    container_name: phishing-dashboard
    command: streamlit run dashboard.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./predictions:/app/predictions
      - ./reports:/app/reports
    networks:
      - phishing-network
    depends_on:
      - api

  # Database (PostgreSQL) - Optional
  db:
    image: postgres:15-alpine
    container_name: phishing-db
    environment:
      POSTGRES_USER: phishing_user
      POSTGRES_PASSWORD: phishing_pass
      POSTGRES_DB: phishing_detector
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - phishing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phishing_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache - Optional
  redis:
    image: redis:7-alpine
    container_name: phishing-redis
    ports:
      - "6379:6379"
    networks:
      - phishing-network
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

networks:
  phishing-network:
    driver: bridge
